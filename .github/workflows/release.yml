name: Build & Release

# Build installers for macOS, Windows and Linux and publish them to this repo's
# GitHub Releases. Triggered manually from the Actions tab; electron-builder publishes a
# release for the version in package.json (bump it before running to cut a new release).
# Each OS builds on its own runner so the native SQLite module is compiled per platform.
on:
  workflow_dispatch: {}

# electron-builder needs to create/update releases on this repo.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      # Each entry packages on a runner whose CPU matches the target arch, so the
      # native better-sqlite3 module is compiled for the arch it ships in. The mac
      # dmgs are split: Apple Silicon on the arm64 runner, Intel on macos-13 (x64).
      matrix:
        include:
          - os: macos-latest # Apple Silicon
            args: --mac --arm64
          - os: macos-13 # Intel — tag the dmg with -intel as well as -x64
            args: --mac --x64 -c.dmg.artifactName='${name}-${version}-x64-intel.${ext}'
          - os: windows-latest
            args: --win
          - os: ubuntu-latest
            args: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installs deps and rebuilds the native better-sqlite3 module for this OS
      # (via the project's electron-builder install-app-deps postinstall hook).
      - name: Install dependencies
        run: npm ci

      - name: Lint & typecheck
        run: |
          npm run lint
          npm run typecheck

      # `npm run build` compiles to out/; electron-builder packages it for the host
      # OS and uploads the installers to a draft GitHub Release.
      - name: Build & publish
        run: |
          npm run build
          npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
